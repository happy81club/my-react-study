services:
  - type: web
    name: my-react-study-oracle-api
    runtime: node
    plan: free
    rootDir: oracle-api
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ORACLE_USER
        sync: false
      - key: ORACLE_PASSWORD
        sync: false
      - key: ORACLE_CONNECT_STRING
        sync: false
